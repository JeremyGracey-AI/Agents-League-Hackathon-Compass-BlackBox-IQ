<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1180" height="820" fill="#f8fafc"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arrp" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#db2777"/></marker>
  </defs>

  <text x="510" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Compass-BlackBox IQ — Three-Layer Platform</text>
  <text x="510" y="71" text-anchor="middle" font-size="13.5" fill="#475569">Built for Microsoft Scout · Agents propose, humans promote</text>

  <!-- Layer 1: Compass Rose -->
  <rect x="60" y="98" width="900" height="148" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="84" y="126" font-size="16" font-weight="700" fill="#3730a3">1 · Compass Rose</text>
  <text x="84" y="145" font-size="12.5" fill="#4338ca">Direction &amp; skill alignment — build role-aligned skills (the open analog to "agents that learn the business")</text>
  <rect x="84" y="160" width="250" height="70" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="100" y="185" font-size="12.5" font-weight="600" fill="#312e81">Persona &amp; role</text>
  <text x="100" y="205" font-size="11" fill="#4f46e5">name · title · charter</text>
  <text x="100" y="221" font-size="11" fill="#4f46e5">KPIs · partners · voice</text>
  <rect x="355" y="160" width="270" height="70" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="371" y="185" font-size="12.5" font-weight="600" fill="#312e81">8 executive archetypes</text>
  <text x="371" y="205" font-size="11" fill="#4f46e5">briefing · triage · strategy</text>
  <text x="371" y="221" font-size="11" fill="#4f46e5">review · 1:1 · decisions-log …</text>
  <rect x="646" y="160" width="290" height="70" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="662" y="185" font-size="12.5" font-weight="600" fill="#312e81">Aligned skills</text>
  <text x="662" y="205" font-size="11" fill="#4f46e5">build · preview · install</text>
  <text x="662" y="221" font-size="11" fill="#4f46e5">no YAML required</text>
  <path d="M334,195 L355,195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M625,195 L646,195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <path d="M510,246 L510,294" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="520" y="276" font-size="11" fill="#64748b">skills installed</text>

  <!-- Layer 2: GM Louis -->
  <rect x="60" y="296" width="900" height="150" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="84" y="324" font-size="16" font-weight="700" fill="#065f46">2 · GM Louis</text>
  <text x="84" y="343" font-size="12.5" fill="#047857">The agent + the web app — everything human-facing, one name</text>
  <rect x="84" y="358" width="415" height="74" rx="8" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="100" y="383" font-size="12.5" font-weight="600" fill="#064e3b">GM Louis (agent) · Microsoft Foundry</text>
  <text x="100" y="403" font-size="11" fill="#059669">multi-step reasoning over MCP tools</text>
  <text x="100" y="420" font-size="11" fill="#059669">recall → act → log · honest citations</text>
  <rect x="521" y="358" width="415" height="74" rx="8" fill="#ffffff" stroke="#a7f3d0"/>
  <text x="537" y="383" font-size="12.5" font-weight="600" fill="#064e3b">GM Louis (web app)</text>
  <text x="537" y="403" font-size="11" fill="#059669">persona → preview → one-click install</text>
  <text x="537" y="420" font-size="11" fill="#059669">for non-technical leads</text>

  <path d="M510,446 L510,500" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="520" y="478" font-size="11" fill="#64748b">acts · logs · grounds</text>

  <!-- Layer 3: BlackBox IQ (GGR) -->
  <rect x="60" y="502" width="900" height="214" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="84" y="530" font-size="16" font-weight="700" fill="#92400e">3 · BlackBox IQ (GGR)</text>
  <text x="84" y="549" font-size="12.5" fill="#b45309">Governance · Grounding · Recorder — the MCP server + the vault</text>
  <rect x="84" y="564" width="266" height="138" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="100" y="589" font-size="12.5" font-weight="600" fill="#78350f">MCP server</text>
  <text x="100" y="609" font-size="11" fill="#b45309">10 tools · TypeScript</text>
  <text x="100" y="626" font-size="11" fill="#b45309">streamable HTTP + stdio</text>
  <text x="100" y="650" font-size="11" font-weight="600" fill="#92400e">ENFORCED INVARIANT</text>
  <text x="100" y="668" font-size="11" fill="#b45309">agent writes decisions</text>
  <text x="100" y="685" font-size="11" fill="#b45309">+ proposals only</text>
  <rect x="366" y="564" width="288" height="138" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="382" y="589" font-size="12.5" font-weight="600" fill="#78350f">Vault — git repo (Markdown)</text>
  <text x="382" y="609" font-size="11" fill="#b45309">blackbox: append-only records</text>
  <text x="382" y="626" font-size="11" fill="#b45309">audit → propose → promote</text>
  <text x="382" y="643" font-size="11" fill="#b45309">git-revert = memory rollback</text>
  <text x="382" y="667" font-size="11" fill="#b45309">every write = git commit</text>
  <text x="382" y="685" font-size="11" font-weight="600" fill="#92400e">[blackbox] · [compass] · [human]</text>
  <rect x="670" y="564" width="266" height="138" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="686" y="589" font-size="12.5" font-weight="600" fill="#78350f">Microsoft Foundry IQ</text>
  <text x="686" y="609" font-size="11" fill="#b45309">Azure AI Search KB</text>
  <text x="686" y="626" font-size="11" fill="#b45309">read-only · source-tagged</text>
  <text x="686" y="650" font-size="11" font-weight="600" fill="#92400e">orthogonal to the vault</text>
  <text x="686" y="668" font-size="11" fill="#b45309">never merged into memory</text>
  <text x="686" y="685" font-size="11" fill="#b45309">+ Fabric IQ / Work IQ (roadmap)</text>

  <!-- Human gate, spanning layers 2-3 -->
  <rect x="985" y="296" width="135" height="420" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="1052" y="328" text-anchor="middle" font-size="14.5" font-weight="700" fill="#9d174d">Human</text>
  <text x="1052" y="347" text-anchor="middle" font-size="11.5" fill="#be185d">operator</text>
  <text x="1052" y="452" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9d174d">the gate</text>
  <text x="1052" y="476" text-anchor="middle" font-size="11" fill="#be185d">approve</text>
  <text x="1052" y="492" text-anchor="middle" font-size="11" fill="#be185d">/ promote</text>
  <text x="1052" y="514" text-anchor="middle" font-size="11" fill="#be185d">reject</text>
  <text x="1052" y="536" text-anchor="middle" font-size="11" fill="#be185d">revert</text>
  <text x="1052" y="588" text-anchor="middle" font-size="11" fill="#be185d">reads the vault</text>
  <text x="1052" y="604" text-anchor="middle" font-size="11" fill="#be185d">in Obsidian</text>
  <text x="1052" y="620" text-anchor="middle" font-size="11" fill="#be185d">(live graph)</text>
  <path d="M985,633 L956,633" stroke="#db2777" stroke-width="1.5" marker-end="url(#arrp)"/>
  <text x="905" y="628" font-size="10" fill="#9d174d">human gate</text>

  <text x="510" y="800" text-anchor="middle" font-size="11.5" fill="#94a3b8">Agents League @ AI Skills Fest 2026 · Reasoning Agents track · Jeremy Gracey</text>
</svg>
